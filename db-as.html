<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DB A/S 신청서</title>

  <!-- 메신저 미리보기 설정 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="삼성화재금융서비스">
  <meta property="og:description" content="DB A/S 신청서">
  <meta property="og:image" content="https://samsungfsmarketing-ui.github.io/db-as-fonts/SSF-LOGO.png?v=2">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://samsungfsmarketing-ui.github.io/db-as-fonts/db-as.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="삼성화재금융서비스">
  <meta name="twitter:description" content="DB A/S 신청서">
  <meta name="twitter:image" content="https://samsungfsmarketing-ui.github.io/db-as-fonts/SSF-LOGO.png?v=2">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f3f7ff 0%, #f8faff 52%, #f4f7fc 100%);
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #1e2430;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 24px;
      padding: 34px 28px 30px;
      box-shadow: 0 18px 48px rgba(8, 38, 110, 0.12);
      text-align: center;
      border: 1px solid rgba(0, 60, 220, 0.10);
    }

    .logo {
      width: 100%;
      max-width: 430px;
      display: block;
      margin: 0 auto 34px;
    }

    .message {
      margin: 0 0 30px;
      color: #1e2430;
      font-size: 22px;
      line-height: 1.55;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .btn {
      display: block;
      width: 100%;
      height: 56px;
      border-radius: 16px;
      background: #003cdc;
      color: #ffffff;
      text-decoration: none;
      line-height: 56px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .small {
      margin-top: 16px;
      color: #8a94a6;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 30px 22px 26px;
        border-radius: 22px;
      }

      .logo {
        margin-bottom: 30px;
      }

      .message {
        font-size: 19px;
        margin-bottom: 28px;
      }

      .btn {
        height: 54px;
        line-height: 54px;
        font-size: 16px;
      }

      .small {
        font-size: 12px;
      }
    }
  </style>

  <script>
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0UGshbspcq6PfoVreHEg-MJol2kYaIqOwdDxs1C577MW26EZ4F43F-O6UX6kPWa0/exec';

    setTimeout(function () {
      location.replace(APP_SCRIPT_URL);
    }, 800);
  </script>
</head>

<body>
  <div class="card">
    <img
      class="logo"
      src="https://samsungfsmarketing-ui.github.io/db-as-fonts/SSF-MAIN-LOGO.png"
      alt="Samsung Fire & Marine Insurance Financial Service"
    >

    <p class="message">잠시 후 DB A/S신청 페이지로 이동합니다.</p>

    <a
      class="btn"
      href="https://script.google.com/macros/s/AKfycbz0UGshbspcq6PfoVreHEg-MJol2kYaIqOwdDxs1C577MW26EZ4F43F-O6UX6kPWa0/exec"
    >
      바로 이동하기
    </a>

    <div class="small">자동으로 이동하지 않으면 버튼을 눌러주세요.</div>
  </div>
</body>
</html>
